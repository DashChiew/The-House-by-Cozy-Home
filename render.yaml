databases:
  - name: thehouse-db
    databaseName: thehouse
    plan: free

services:
  # ── Unified Backend & Frontend Web Service ──────────────────────────────────
  - type: web
    name: thehouse-backend
    runtime: python
    rootDir: backend
    # Installs Python packages, creates DB tables, builds the React frontend
    buildCommand: pip install -r requirements.txt && python init_db.py && cd ../frontend && npm install && npm run build
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: thehouse-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
