databases:
  - name: thehouse-db
    databaseName: thehouse
    plan: free

services:
  # ── Backend Flask API ────────────────────────────────────────────────────────
  - type: web
    name: thehouse-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python init_db.py
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: thehouse-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0

  # ── Frontend React (Static Site) ────────────────────────────────────────────
  - type: web
    name: thehouse-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: thehouse-backend
          type: web
          property: host
